services:

  postgres:
    image: postgres:18-alpine
    container_name: gestion-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gestion-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gestion-backend-dev
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - ./storage:/app/storage
      - /app/node_modules
    networks:
      - gestion-network

networks:
  gestion-network:
    driver: bridge

volumes:
  postgres_dev_data:
